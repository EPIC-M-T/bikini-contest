      <stop offset="0" stop-color="#f2f6da"/>
      <stop offset="0.55" stop-color="#d9e1ba"/>
      <stop offset="1" stop-color="#a9bd86"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="10" stdDeviation="5" flood-color="#06250e" flood-opacity=".45"/>
