    <symbol id="bill" viewBox="0 0 210 94">
      <rect x="4" y="4" width="202" height="86" rx="8" fill="url(#paper)" stroke="#355f35" stroke-width="5"/>
      <rect x="24" y="18" width="162" height="58" rx="6" fill="none" stroke="#587b4a" stroke-width="3" opacity=".7"/>
      <circle cx="105" cy="47" r="24" fill="#dce8c7" stroke="#486f42" stroke-width="3"/>
      <text x="105" y="56" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="33" fill="#285b2e">$</text>
      <text x="22" y="34" font-family="Arial Black,sans-serif" font-size="19" fill="#24542a">100</text>
      <text x="188" y="72" text-anchor="end" font-family="Arial Black,sans-serif" font-size="19" fill="#24542a">100</text>
      <rect x="76" y="4" width="20" height="86" fill="#738d4c" opacity=".62"/>
      <rect x="116" y="4" width="20" height="86" fill="#738d4c" opacity=".5"/>
