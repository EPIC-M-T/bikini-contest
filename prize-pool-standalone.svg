<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="t d">
<title id="t">EPIC Bikini Contest Prize Pool</title>
<desc id="d">Prize pool graphic showing first place $10,000, second place $5,000, and third place $2,500.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#050812"/><stop offset=".45" stop-color="#130617"/><stop offset="1" stop-color="#031421"/></linearGradient>
<radialGradient id="pink" cx="50%" cy="10%" r="70%"><stop offset="0" stop-color="#ff45ce" stop-opacity=".95"/><stop offset=".42" stop-color="#ff45ce" stop-opacity=".22"/><stop offset="1" stop-color="#ff45ce" stop-opacity="0"/></radialGradient>
<radialGradient id="cyan" cx="80%" cy="72%" r="55%"><stop offset="0" stop-color="#41eaff" stop-opacity=".6"/><stop offset="1" stop-color="#41eaff" stop-opacity="0"/></radialGradient>
<linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff4a6"/><stop offset=".25" stop-color="#ffc84f"/><stop offset=".55" stop-color="#9b5a09"/><stop offset=".78" stop-color="#ffdd72"/><stop offset="1" stop-color="#7a3a00"/></linearGradient>
<linearGradient id="silver" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset=".27" stop-color="#d8dde7"/><stop offset=".58" stop-color="#747b8a"/><stop offset=".8" stop-color="#f2f6ff"/><stop offset="1" stop-color="#626a77"/></linearGradient>
<linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd19a"/><stop offset=".32" stop-color="#d8762a"/><stop offset=".58" stop-color="#7a2f0b"/><stop offset=".82" stop-color="#ffb06f"/><stop offset="1" stop-color="#5a2105"/></linearGradient>
<filter id="glowPink"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity=".72"/></filter>
<pattern id="money" width="180" height="92" patternUnits="userSpaceOnUse" patternTransform="rotate(-12)"><rect width="180" height="92" fill="none"/><rect x="10" y="12" width="145" height="58" rx="7" fill="#dce8c0" opacity=".18" stroke="#9ed173" stroke-opacity=".32"/><circle cx="82" cy="41" r="18" fill="#0f5f31" opacity=".16"/><text x="18" y="35" font-family="Arial Black,Arial" font-size="20" fill="#b9e394" opacity=".28">100</text></pattern>
</defs>
<rect width="1600" height="1200" fill="url(#bg)"/>
<rect width="1600" height="1200" fill="url(#money)" opacity="1"/>
<rect width="1600" height="1200" fill="url(#pink)"/><rect width="1600" height="1200" fill="url(#cyan)"/>
<path d="M0 0h1600v1200H0z" fill="none" stroke="#ff36c9" stroke-width="8" opacity=".52"/>
<g opacity=".42" fill="none" stroke-linecap="round"><path d="M80 1020C240 880 330 760 420 560" stroke="#25e7ff" stroke-width="8"/><path d="M1520 1020c-160-140-250-260-340-460" stroke="#ff36c9" stroke-width="8"/><path d="M170 1040c80-210 155-360 310-520" stroke="#ff36c9" stroke-width="4"/><path d="M1430 1040c-80-210-155-360-310-520" stroke="#25e7ff" stroke-width="4"/></g>
<g filter="url(#shadow)">
<g transform="translate(72 70)"><path d="M92 46c18-43 110-43 128 0 34 9 54 40 43 72l-50 148H99L49 118c-11-32 9-63 43-72Z" fill="url(#gold)" stroke="#fff2a8" stroke-width="5"/><path d="M105 35h105" stroke="#6b3000" stroke-width="16" stroke-linecap="round"/><text x="156" y="180" text-anchor="middle" font-family="Impact,Arial Black" font-size="96" fill="#4c2100">$</text></g>
<g transform="translate(1260 70)"><path d="M92 46c18-43 110-43 128 0 34 9 54 40 43 72l-50 148H99L49 118c-11-32 9-63 43-72Z" fill="url(#gold)" stroke="#fff2a8" stroke-width="5"/><path d="M105 35h105" stroke="#6b3000" stroke-width="16" stroke-linecap="round"/><text x="156" y="180" text-anchor="middle" font-family="Impact,Arial Black" font-size="96" fill="#4c2100">$</text></g>
</g>
<text x="800" y="205" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="190" letter-spacing="8" fill="url(#gold)" stroke="#fff2a8" stroke-width="3" filter="url(#glowPink)">PRIZE POOL</text>
<line x1="240" y1="270" x2="1360" y2="270" stroke="#ff36c9" stroke-width="8" opacity=".86" filter="url(#glowPink)"/>
<g filter="url(#shadow)">
<g transform="translate(185 330)"><rect width="1230" height="220" rx="44" fill="#100907" opacity=".84" stroke="#ffd761" stroke-width="6"/><circle cx="140" cy="110" r="82" fill="url(#gold)" stroke="#fff2a8" stroke-width="6"/><text x="140" y="142" text-anchor="middle" font-family="Impact,Arial Black" font-size="112" fill="#6e3600">1</text><text x="650" y="153" text-anchor="middle" font-family="Impact,Arial Black" font-size="158" letter-spacing="7" fill="url(#gold)" stroke="#fff2a8" stroke-width="3">$10,000</text></g>
<g transform="translate(185 610)"><rect width="1230" height="200" rx="40" fill="#071116" opacity=".86" stroke="#5cefff" stroke-width="6"/><circle cx="140" cy="100" r="76" fill="url(#silver)" stroke="#ffffff" stroke-width="6"/><text x="140" y="130" text-anchor="middle" font-family="Impact,Arial Black" font-size="104" fill="#4c5360">2</text><text x="650" y="137" text-anchor="middle" font-family="Impact,Arial Black" font-size="142" letter-spacing="7" fill="url(#silver)" stroke="#ffffff" stroke-width="3">$5,000</text></g>
<g transform="translate(185 865)"><rect width="1230" height="200" rx="40" fill="#140905" opacity=".86" stroke="#ff9652" stroke-width="6"/><circle cx="140" cy="100" r="76" fill="url(#bronze)" stroke="#ffd0a1" stroke-width="6"/><text x="140" y="130" text-anchor="middle" font-family="Impact,Arial Black" font-size="104" fill="#5a2105">3</text><text x="650" y="137" text-anchor="middle" font-family="Impact,Arial Black" font-size="142" letter-spacing="7" fill="url(#bronze)" stroke="#ffd0a1" stroke-width="3">$2,500</text></g>
