name: Replace hero overlay animation asset

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/replace-overlay-asset.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace-overlay:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace Giphy hero overlays in HTML files
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          new_url = "https://assets.cdn.filesafe.space/YzjwmP6zpvDUp28hrM1o/media/6a4b12676f5641e105b994ee.webp"
          patterns = [
              re.compile(r"https://media\d*\.giphy\.com/media/[^\"'<>\s]+?\.gif"),
              re.compile(r"https://media\.giphy\.com/media/[^\"'<>\s]+?\.gif"),
          ]

          changed = []
          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              updated = text
              for pattern in patterns:
                  updated = pattern.sub(new_url, updated)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          if changed:
              print('Updated files:')
              for file in changed:
                  print(f' - {file}')
          else:
              print('No Giphy overlay URLs found to replace.')
          PY

      - name: Commit and publish changes
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update hero overlay animation asset"
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
