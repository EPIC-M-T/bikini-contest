name: Replace hero overlay animation asset

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/replace-overlay-asset.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace-overlay:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update hero overlay and static-logo timing
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          new_url = "https://assets.cdn.filesafe.space/YzjwmP6zpvDUp28hrM1o/media/6a4b12676f5641e105b994ee.webp"
          giphy_patterns = [
              re.compile(r"https://media\d*\.giphy\.com/media/[^\"'<>\s]+?\.gif"),
              re.compile(r"https://media\.giphy\.com/media/[^\"'<>\s]+?\.gif"),
          ]

          changed = []
          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              original = text

              for pattern in giphy_patterns:
                  text = pattern.sub(new_url, text)

              text = text.replace(
                  ".hero-logo-static{opacity:0;transition:opacity .7s ease}",
                  ".hero-logo-static{opacity:0;visibility:hidden;transition:opacity .45s ease .82s,visibility 0s linear .82s}"
              )
              text = text.replace(
                  ".hero-logo-full.intro-complete .hero-logo-static{opacity:1}",
                  ".hero-logo-full.intro-complete .hero-logo-static{opacity:1;visibility:visible}"
              )
              text = text.replace(
                  ".hero-logo-animated{position:absolute;inset:0;z-index:2;display:grid;place-items:center;opacity:1;visibility:visible;transition:opacity .75s ease,visibility .75s ease;pointer-events:none}",
                  ".hero-logo-animated{position:absolute;inset:0;z-index:2;display:grid;place-items:center;opacity:1;visibility:visible;transition:opacity .75s ease,visibility 0s linear .75s;pointer-events:none}"
              )
              text = text.replace(
                  "@media(prefers-reduced-motion:reduce){.hero-logo-static{opacity:1}.hero-logo-animated{display:none}}",
                  "@media(prefers-reduced-motion:reduce){.hero-logo-static{opacity:1;visibility:visible;transition:none}.hero-logo-animated{display:none}}"
              )

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          if changed:
              print('Updated files:')
              for file in changed:
                  print(f' - {file}')
          else:
              print('No matching overlay/static-logo patterns found.')
          PY

      - name: Commit and publish changes
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Delay static hero logo until animation fades"
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
