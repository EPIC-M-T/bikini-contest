name: Replace hero overlay animation asset

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/replace-overlay-asset.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch OG pages and hero assets
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          overlay_url = "https://assets.cdn.filesafe.space/YzjwmP6zpvDUp28hrM1o/media/6a4b12676f5641e105b994ee.webp"
          giphy_patterns = [
              re.compile(r"https://media\d*\.giphy\.com/media/[^\"'<>\s]+?\.gif"),
              re.compile(r"https://media\.giphy\.com/media/[^\"'<>\s]+?\.gif"),
          ]
          changed = []
          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              for pattern in giphy_patterns:
                  text = pattern.sub(overlay_url, text)
              text = text.replace(
                  ".hero-logo-static{opacity:0;transition:opacity .7s ease}",
                  ".hero-logo-static{opacity:0;visibility:hidden;transition:opacity .45s ease .82s,visibility 0s linear .82s}"
              )
              text = text.replace(
                  ".hero-logo-full.intro-complete .hero-logo-static{opacity:1}",
                  ".hero-logo-full.intro-complete .hero-logo-static{opacity:1;visibility:visible}"
              )
              text = text.replace(
                  "@media(prefers-reduced-motion:reduce){.hero-logo-static{opacity:1}.hero-logo-animated{display:none}}",
                  "@media(prefers-reduced-motion:reduce){.hero-logo-static{opacity:1;visibility:visible;transition:none}.hero-logo-animated{display:none}}"
              )
              if path.as_posix() in {'og/index.html', 'og/apply.html'}:
                  if 'model-cards.css' not in text:
                      text = text.replace('</head>', '<link rel="stylesheet" href="model-cards.css"></head>')
                  if 'model-cards.js' not in text:
                      text = text.replace('</body>', '<script src="model-cards.js"></script></body>')
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))
          if changed:
              print('Updated files:')
              for file in changed:
                  print(' - ' + file)
          else:
              print('No changes needed.')
          PY

      - name: Commit and publish changes
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Wire approved model cards into OG pages"
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
